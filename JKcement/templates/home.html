<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JKC Dashboard - Interactive Flow</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Montserrat:wght@500;700;800&display=swap');

        :root { 
            --primary: #0F172A; 
            --accent: #38BDF8; 
            --nav: #1E293B; 
            --bg: #F8FAFC; 
        }

        body, html { margin:0; padding:0; width:100%; height:100%; font-family:'Montserrat',sans-serif; background:var(--bg); overflow-x:hidden; transition: background 0.3s ease; }

        .header-bar { 
            width:100%; height:90px; background:#0F172A; display:flex; 
            align-items:center; justify-content:space-between; padding:0; z-index:100; position:relative;
        }
        .main-title { 
            color:var(--accent); font-family:'Orbitron',sans-serif; font-size:26px; 
            font-weight:900; letter-spacing:2px; text-shadow:0 0 10px var(--accent); margin-left: 40px;
        }
        
        .logo-shape-border {
            height: 90px; width: 280px; background: var(--accent); 
            clip-path: polygon(15% 0%, 100% 0%, 100% 100%, 0% 100%);
            display: flex; align-items: center; justify-content: center;
        }

        .logo-container { 
            height: calc(100% - 12px); width: calc(100% - 12px);
            background: #FFFFFF; display: flex; align-items: center; justify-content: center; 
            gap: 15px; padding-left: 30px; clip-path: polygon(15% 0%, 100% 0%, 100% 100%, 0% 100%);
        }
        .logo-img { max-height: 35px; max-width: 100px; object-fit: contain; }

        .nav-tabs { width:100%; background:var(--nav); display:flex; z-index:90; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .tab { 
            flex:1; text-align:center; padding:20px 5px; color:white; opacity:0.6; 
            cursor:pointer; font-weight:800; font-size: 11px; transition:0.3s; 
            border-right: 1px solid rgba(255,255,255,0.1); text-transform: uppercase;
        }
        .tab:hover { opacity: 1; background: rgba(255,255,255,0.05); }
        .tab.active { background:white; color:var(--primary); opacity:1; border-bottom: 5px solid var(--accent); }

        .container { padding:10px 0; height:calc(100vh - 160px); overflow-y:auto; }
        .category-section { display:none; padding-bottom: 100px; }

        .center-wrapper { position:relative; width:100%; height: 320px; display:flex; align-items:center; justify-content:center; flex-direction: column; }
        
        .expand-btn-container { width: 100%; height: 35px; display: flex; justify-content: center; align-items: center; position: absolute; top: 35px; }
        .expand-btn { 
            background:var(--accent); border:none; color:var(--primary); padding: 8px 20px; border-radius:4px; 
            cursor:pointer; font-size:11px; font-weight:900; font-family:'Orbitron'; z-index: 50;
        }

        .center-orb-container { 
            position: relative; width: 130px; height: 130px; display: flex; align-items: center; justify-content: center; z-index: 10; cursor: pointer; margin-top: 50px;
            opacity: 0; transform: scale(0.5); transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .center-orb-container.animate-pop { opacity: 1; transform: scale(1); }

        .inner-orb { width: 100%; height: 100%; border-radius: 50%; background: white; border: 5px solid var(--primary); display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 25px rgba(0,0,0,0.1); aspect-ratio: 1/1; }
        .center-cat-name { color: var(--primary); font-weight: 800; font-size: 12px; text-align: center; text-transform: uppercase; width: 85%; line-height: 1.2; }
        
        .outer-glow-ring { position: absolute; width: 112%; height: 112%; border-radius: 50%; border: 2px solid var(--accent); opacity: 0.5; animation: orbPulse 3s infinite ease-in-out; }
        @keyframes orbPulse { 0%, 100% { transform: scale(0.95); opacity: 0.3; } 50% { transform: scale(1.05); opacity: 0.7; box-shadow: 0 0 25px var(--accent); } }

        .stat-badge { position: absolute; display: flex; flex-direction: column; align-items: center; top: 35%; opacity: 0; }
        .left-badge { left: 15%; }
        .right-badge { right: 15%; }

        .cube-container { position: relative; width: 60px; height: 60px; margin-bottom: 8px; }
        .cube-face { position: absolute; width: 100%; height: 100%; }
        .front { background: var(--primary); clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); display: flex; align-items: center; justify-content: center; z-index: 3; }
        .top { background: var(--primary); filter: brightness(1.5); clip-path: polygon(50% 0%, 100% 25%, 50% 50%, 0% 25%); transform: translateY(-25%); }
        .side { background: var(--primary); filter: brightness(0.6); clip-path: polygon(0% 25%, 50% 50%, 50% 100%, 0% 75%); transform: translateX(-50%); }
        .stat-value { font-family: 'Orbitron'; font-size: 18px; color: white; font-weight: 900; }
        .stat-label { font-family: 'Orbitron'; font-size: 8px; color: var(--primary); font-weight: 800; letter-spacing: 1px; }

        .lines-svg { width:100%; height: 80px; position: absolute; top: 240px; pointer-events: none; z-index: 1; display: none; }
        .pulse-line { fill:none; stroke:var(--primary); stroke-width:2; stroke-dasharray:6; animation:dash 2s linear infinite; opacity:0.3; }
        @keyframes dash { to { stroke-dashoffset:-24; } }

        .sub-grid-container { display:none; width:100%; padding: 0 40px; box-sizing:border-box; gap: 15px; }
        .sub-node { 
            width:95px; height:95px; border-radius:50%; display:flex; align-items:center; justify-content:center; 
            color:white; font-weight:800; cursor:pointer; text-align:center; padding:10px; font-size:10px; border: 3px solid #fff; 
            background: radial-gradient(circle at 30% 30%, var(--accent) 0%, var(--primary) 90%); box-shadow: 0 5px 10px rgba(0,0,0,0.15); margin: 0 auto; 
        }

        .glass-card { margin-top:15px; display: none; }
        .obj-item {
            background: white; margin-bottom: 6px; display: flex; align-items: center; 
            border-radius: 4px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); border-left: 4px solid var(--primary); 
            min-height: 35px; transition: 0.2s;
        }
        .obj-item:hover { transform: translateX(5px); background: #f8fafc; }
        .obj-text { flex: 1; padding: 6px 10px; font-size: 10px; color: #333; font-weight: 700; }
        .obj-btn { background: var(--primary); color: var(--accent); padding: 0 12px; height: 35px; display: flex; align-items: center; font-family: 'Orbitron'; font-size: 10px; cursor: pointer; border: none; }

        @keyframes slideInLeft {
            from { transform: translateX(-200px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes slideInRight {
            from { transform: translateX(200px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .animate-left { animation: slideInLeft 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
        .animate-right { animation: slideInRight 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
    </style>
</head>

    const themes = {
        'SUPPLIER':      { p: '#0F172A', a: '#38BDF8', n: '#1E293B', b: '#F8FAFC' }, 
        'CUSTOMER':      { p: '#1B5E20', a: '#4CAF50', n: '#0D3311', b: '#E8F5E9' }, 
        'IT_CONTROLS':   { p: '#2D3436', a: '#00CEC9', n: '#1A1A1A', b: '#F1F2F6' },
        'FINANCE':       { p: '#3C332A', a: '#D4AF37', n: '#26211B', b: '#FFFCF5' }, 
        'MANUFACTURING': { p: '#2C3E50', a: '#E74C3C', n: '#1A252F', b: '#FDEDEC' }, 
        'PAYROLL':       { p: '#31004A', a: '#D000FF', n: '#1F0030', b: '#FAF5FF' }, 
        'TAXATION':      { p: '#000000', a: '#CCFF00', n: '#1A1A1A', b: '#FCFFFA' },
        'FIXED_ASSET':   { p: '#1A1A1A', a: '#FF8C00', n: '#000000', b: '#FFF9F2' }  
    };

    const catOrder = ["SUPPLIER", "CUSTOMER", "IT CONTROLS", "FINANCE", "MANUFACTURING", "PAYROLL", "TAXATION", "FIXED ASSET"];
    // REPLACE ONLY THE init() function inside your <script> tag with this:

function init() {
    const nav = document.getElementById('navTabs');
    const main = document.getElementById('mainContainer');

    catOrder.forEach((catName, i) => {
        const cleanId = catName.replace(/\s+/g, '_');
        const catRows = rawData.filter(d => d.c === catName);
        const subs = [...new Set(catRows.map(d => d.s))];

        const tab = document.createElement('div');
        tab.className = `tab ${i === 0 ? 'active' : ''}`;
        tab.id = `tab_${cleanId}`;
        tab.innerText = catName;
        tab.onclick = () => switchTab(cleanId);
        nav.appendChild(tab);

        const section = document.createElement('div');
        section.className = 'category-section';
        section.id = cleanId;
        if(i === 0) section.style.display = 'block';

        let lines = "";
        subs.forEach((_, idx) => {
            let xPos = (100 / subs.length) * (idx + 0.5);
            lines += `<path class="pulse-line" d="M 50 10 L 50 40 L ${xPos} 40 L ${xPos} 90" />`;
        });

        const subGridHtml = subs.map(subName => {
            const subId = (cleanId + "_" + subName).replace(/\s+/g, '_');
            const items = catRows.filter(d => d.s === subName);
            
            // 1. Matches FOLDER names exactly (e.g., Supplier, Customer, Fixed_Asset)
            let catPath = catName.charAt(0) + catName.slice(1).toLowerCase().replace(/\s+/g, '_');
            if(catName === "IT CONTROLS") catPath = "ITcontrols";
            if(catName === "FIXED ASSET") catPath = "Fixed_Asset";
            if(catName === "SUPPLIER") catPath = "Supplier"; // Ensure Capital S
            if(catName === "CUSTOMER") catPath = "Customer";
            
            let subPath = subName.toLowerCase().replace(/\s+/g, '_'); 

             
            const objectiveListHtml = items.map(it => {
               const url = `/${catPath}/${subPath}/?oid=${it.id}`;
               return `<div class="obj-item">
               <div class="obj-text">${it.o}</div>
               <div class="obj-btn" onclick="window.location.href='${url}'">»»</div>
               </div>`;
            }).join('');

            return `
                <div class="sub-col">
                    <div class="sub-node" onclick="toggleObjectives('${subId}')">${subName} (${items.length})</div>
                    <div class="glass-card" id="${subId}">${objectiveListHtml}</div>
                </div>`;
        }).join('');

        section.innerHTML = `
            <div class="center-wrapper">
                <div class="expand-btn-container">
                    <button class="expand-btn" id="btn_${cleanId}" onclick="toggleExpandAll('${cleanId}')">EXPAND ALL</button>
                </div>
                <div class="stat-badge left-badge">
                    <div class="cube-container">
                        <div class="cube-face top"></div><div class="cube-face side"></div>
                        <div class="cube-face front"><span class="stat-value">${catRows.length}</span></div>
                    </div>
                    <div class="stat-label">OBJECTIVES</div>
                </div>
                <div class="center-orb-container" onclick="toggleSubCategories('${cleanId}')">
                    <div class="outer-glow-ring"></div>
                    <div class="inner-orb"><span class="center-cat-name">${catName}</span></div>
                </div>
                <div class="stat-badge right-badge">
                    <div class="cube-container">
                        <div class="cube-face top"></div><div class="cube-face side"></div>
                        <div class="cube-face front"><span class="stat-value">${subs.length}</span></div>
                    </div>
                    <div class="stat-label">SUB-CATEGORIES</div>
                </div>
                <svg id="lines_${cleanId}" class="lines-svg" viewBox="0 0 100 100" preserveAspectRatio="none">${lines}</svg>
            </div>
            <div class="sub-grid-container" id="grid_${cleanId}" style="grid-template-columns: repeat(${subs.length}, 1fr);">
                ${subGridHtml}
            </div>
        `;
        main.appendChild(section);
    });
    setTimeout(() => triggerAnimations('SUPPLIER'), 100);
}
    function triggerAnimations(id) {
        const section = document.getElementById(id);
        if(!section) return;
        const left = section.querySelector('.left-badge');
        const right = section.querySelector('.right-badge');
        const orb = section.querySelector('.center-orb-container');
        left.classList.remove('animate-left');
        right.classList.remove('animate-right');
        orb.classList.remove('animate-pop');
        void left.offsetWidth; 
        left.classList.add('animate-left');
        right.classList.add('animate-right');
        orb.classList.add('animate-pop');
    }

    function switchTab(id) {
        document.querySelectorAll('.category-section').forEach(s => s.style.display = 'none');
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        const targetSection = document.getElementById(id);
        if (targetSection) {
            targetSection.style.display = 'block';
            triggerAnimations(id);
        }
        const activeTab = document.getElementById('tab_' + id);
        if (activeTab) activeTab.classList.add('active');
        const theme = themes[id] || themes['SUPPLIER'];
        document.documentElement.style.setProperty('--primary', theme.p);
        document.documentElement.style.setProperty('--accent', theme.a);
        document.documentElement.style.setProperty('--nav', theme.n);
        document.documentElement.style.setProperty('--bg', theme.b);
    }

    function toggleSubCategories(catId) {
        const grid = document.getElementById('grid_' + catId);
        const lines = document.getElementById('lines_' + catId);
        if (!grid) return;
        const isHidden = grid.style.display === 'none' || grid.style.display === '';
        grid.style.display = isHidden ? 'grid' : 'none';
        if (lines) lines.style.display = isHidden ? 'block' : 'none';
    }

    function toggleObjectives(subId) {
        const el = document.getElementById(subId);
        if (el) el.style.display = (el.style.display === 'block') ? 'none' : 'block';
    }

    function toggleExpandAll(catId) {
        const grid = document.getElementById('grid_' + catId);
        const lines = document.getElementById('lines_' + catId);
        const btn = document.getElementById('btn_' + catId);
        const section = document.getElementById(catId);
        if (!section) return;
        const cards = section.querySelectorAll('.glass-card');
        if (btn.innerText === "EXPAND ALL") {
            if (grid) grid.style.display = 'grid';
            if (lines) lines.style.display = 'block';
            cards.forEach(c => c.style.display = 'block');
            btn.innerText = "CLEAR ALL";
        } else {
            if (grid) grid.style.display = 'none';
            if (lines) lines.style.display = 'none';
            cards.forEach(c => c.style.display = 'none');
            btn.innerText = "EXPAND ALL";
        }
    }

    window.onload = init;
</script>
</body>
</html>
